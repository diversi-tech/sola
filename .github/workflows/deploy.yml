name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ── Per-project config (the only lines that differ between repos) ──
env:
  PROJECT_NAME: sola-security
  PUBLISH_DIR: packages/frontend/build
  BUILD_CMD: npm ci && npm run build --workspace=packages/shared && CI=false npm run build --workspace=packages/frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute team label
        run: |
          case "$GITHUB_REF_NAME" in
            main) TEAM="production" ;;
            *-[0-9]|*-[0-9][0-9]) TEAM="Team ${GITHUB_REF_NAME##*-}" ;;
            *) TEAM="$GITHUB_REF_NAME" ;;
          esac
          echo "TEAM=$TEAM" >> "$GITHUB_ENV"

      - name: Notify build started
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set +e
          TITLE="🟡 $PROJECT_NAME · $TEAM"
          BODY=$(printf '*Build started* · branch `%s`\n`%s` by %s' "$GITHUB_REF_NAME" "${GITHUB_SHA:0:7}" "$GITHUB_ACTOR")
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' \
            --data "$(jq -n --arg t "$TITLE" --arg b "$BODY" '{blocks:[{type:"header",text:{type:"plain_text",text:$t,emoji:true}},{type:"section",text:{type:"mrkdwn",text:$b}}]}')"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        shell: bash
        run: |
          set -eo pipefail
          eval "$BUILD_CMD" 2>&1 | tee build.log

      - name: Deploy to Cloudflare Pages
        if: success()
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -eo pipefail
          npx wrangler@3 pages project create "$PROJECT_NAME" --production-branch=main 2>/dev/null || true
          npx wrangler@3 pages deploy "$PUBLISH_DIR" --project-name="$PROJECT_NAME" --branch="$GITHUB_REF_NAME" 2>&1 | tee deploy.log
          SUB=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT_NAME" | jq -r '.result.subdomain')
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            URL="https://$SUB"
          else
            ALIAS=$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-28)
            URL="https://$ALIAS.$SUB"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Notify success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set +e
          TITLE="✅ $PROJECT_NAME · $TEAM"
          BODY=$(printf '*Deployed* · branch `%s`\n<%s>\n`%s` by %s' "$GITHUB_REF_NAME" "${{ steps.deploy.outputs.url }}" "${GITHUB_SHA:0:7}" "$GITHUB_ACTOR")
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' \
            --data "$(jq -n --arg t "$TITLE" --arg b "$BODY" '{blocks:[{type:"header",text:{type:"plain_text",text:$t,emoji:true}},{type:"section",text:{type:"mrkdwn",text:$b}}]}')"

      - name: Notify failure with error
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set +e
          LOG="$( { [ -f build.log ] && tail -c 2000 build.log; [ -f deploy.log ] && { echo; echo '--- deploy ---'; tail -c 500 deploy.log; }; } 2>/dev/null )"
          [ -z "$LOG" ] && LOG="(no logs captured)"
          TITLE="❌ $PROJECT_NAME · $TEAM"
          BODY=$(printf '*Build FAILED* · branch `%s`\n`%s` by %s' "$GITHUB_REF_NAME" "${GITHUB_SHA:0:7}" "$GITHUB_ACTOR")
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' \
            --data "$(jq -n --arg t "$TITLE" --arg b "$BODY" --arg log "$LOG" '{blocks:[{type:"header",text:{type:"plain_text",text:$t,emoji:true}},{type:"section",text:{type:"mrkdwn",text:$b}},{type:"section",text:{type:"mrkdwn",text:("```\n"+$log+"\n```")}}]}')"
